            - generic [ref=e150]:
              - paragraph [ref=e151]: De energietransitie versnelt, en voor u als woningeigenaar in Leidsche Rijn, Utrecht, is het cruciaal om nu actie te ondernemen, vooral met het oog op 2027.
              - paragraph [ref=e152]:
                - strong [ref=e153]: "Uw woning in Leidsche Rijn: klaar voor de toekomst?"
                - text: Met een gemiddeld bouwjaar van 2001, bezit u een woning die doorgaans uitstekend geschikt is voor zonnepanelen. De daken in Leidsche Rijn zijn vaak in goede conditie, wat de installatie vereenvoudigt. Bovendien is de groepenkast in veel woningen uit 2001 al geschikt voor een omvormer, al kan een kleine upgrade wenselijk zijn om optimale prestaties te garanderen. Dit betekent dat de drempel voor u om te investeren in duurzame energie lager is dan u wellicht denkt. De geschatte jaarlijkse besparing voor woningen in Leidsche Rijn ligt tussen de
                - strong [ref=e154]: €700 en €1.100
                - text: ", met een terugverdientijd van 7 tot 10 jaar, zelfs met de naderende wijzigingen in de salderingsregeling."
              - paragraph [ref=e155]:
                - strong [ref=e156]: "Netcongestie in Leidsche Rijn: een urgente realiteit."
                - text: Het stroomnet in Leidsche Rijn is niet langer een onuitputtelijke bron. Netbeheer Nederland heeft de status voor netcongestie hier op
                - strong [ref=e157]: ORANJE
                - text: gezet. Dit betekent dat het netwerk van Liander/Enexis toenemend vol raakt en er in de komende jaren beperkingen op teruglevering te verwachten zijn. Voor u als woningeigenaar in Leidsche Rijn heeft dit directe gevolgen voor de financiële opbrengst van uw zonnepanelen. Waar u voorheen onbeperkt stroom kon terugleveren en dit volledig kon salderen, wordt de capaciteit nu een kritische factor. De afbouw van de salderingsregeling, die definitief stopt op
                - strong [ref=e158]: 1 januari 2027
                - text: ", maakt deze situatie nog urgenter. Een thuisbatterij wordt hierdoor steeds relevanter en transformeert van een luxe naar een noodzakelijke investering om uw zelfverbruik te maximaliseren en onafhankelijk te blijven van het overvolle net."
          - generic [ref=e159]:
            - paragraph [ref=e160]: Netwerkbeperkingen
            - heading "Netcapaciteit & batterijopties" [level=3] [ref=e161]
            - generic [ref=e162]:
